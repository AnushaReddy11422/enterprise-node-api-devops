name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Login Docker Hub
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-node-api:${{ github.sha }} .

      # Push image
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-node-api:${{ github.sha }}

      # Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # Configure kubeconfig
      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/enterprise-node-api \
          node-api=${{ secrets.DOCKERHUB_USERNAME }}/enterprise-node-api:${{ github.sha }}

          kubectl rollout status deployment/enterprise-node-api